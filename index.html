<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İzmir Seaside Guide</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #e0f7fa;
            color: #01579b;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 100%;
        }
        h1 { text-align: center; color: #0277bd; }
        .input-group { margin-bottom: 1rem; }
        label { display: block; margin-bottom: 0.5rem; font-weight: bold; }
        select {
            width: 100%;
            padding: 0.8rem;
            border-radius: 8px;
            border: 1px solid #b3e5fc;
            outline: none;
        }
        button {
            width: 100%;
            padding: 1rem;
            background-color: #0288d1;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover { background-color: #01579b; }
        #result {
            margin-top: 1.5rem;
            padding: 1rem;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
            display: none;
            background-color: #fff9c4;
            border: 1px solid #fbc02d;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🌊 İzmir Seaside Guide</h1>
    <p style="text-align: center;">Find the best spot based on wind conditions.</p>

    <!-- 5 Decision Points -->
    <div class="input-group">
        <label>1. Wind Direction:</label>
        <select id="windDirection">
            <option value="poyraz">Poyraz (North)</option>
            <option value="lodos">Lodos (South)</option>
            <option value="imbat">İmbat (West/Sea)</option>
        </select>
    </div>

    <div class="input-group">
        <label>2. Wind Strength:</label>
        <select id="windStrength">
            <option value="light">Light Breeze</option>
            <option value="strong">Strong Wind</option>
        </select>
    </div>

    <div class="input-group">
        <label>3. Your Activity:</label>
        <select id="activity">
            <option value="swimming">Swimming</option>
            <option value="windsurfing">Windsurfing</option>
            <option value="relaxing">Just Relaxing</option>
        </select>
    </div>

    <div class="input-group">
        <label>4. Transport:</label>
        <select id="transport">
            <option value="public">Public Transport</option>
            <option value="private">Private Car</option>
        </select>
    </div>

    <div class="input-group">
        <label>5. Atmosphere (Vibe):</label>
        <select id="vibe">
            <option value="popular">Popular & Crowded</option>
            <option value="quiet">Quiet & Hidden</option>
        </select>
    </div>

    <button onclick="getRecommendation()">Get Recommendation</button>

    <div id="result"></div>

    <footer style="margin-top: 20px; font-size: 0.8rem; text-align: center; color: #78909c;">
        Built for Computational Thinking Assignment 2026
    </footer>
</div>

<script>
    function getRecommendation() {
        // Variables
        const w = document.getElementById('windDirection').value;
        const s = document.getElementById('windStrength').value;
        const a = document.getElementById('activity').value;
        const t = document.getElementById('transport').value;
        const v = document.getElementById('vibe').value;
        
        let recommendation = "";

        // IF-ELSE Logic Strings Implementation
        if (w === "poyraz" && a === "swimming" && v === "quiet") {
            recommendation = "📍 Urla Altınköy: Perfect during Poyraz, crystal clear and shielded.";
        } 
        else if (w === "poyraz" && a === "swimming" && v === "popular") {
            recommendation = "📍 Çeşme Paşalimanı: Calm waters during north winds with beach club vibes.";
        }
        else if (w === "poyraz" && a === "relaxing") {
            recommendation = "📍 Old Foça: Enjoy the sunset in the harbor without too much wind shake.";
        }
        else if (w === "lodos" && a === "swimming") {
            recommendation = "📍 Karaburun Kuyucak: When the south wind blows, head north for calm sea.";
        }
        else if (w === "lodos" && a === "windsurfing") {
            recommendation = "📍 Çeşme Pırlanta Beach: The best waves for surfing during Lodos.";
        }
        else if (w === "lodos" && a === "relaxing" && t === "private") {
            recommendation = "📍 Sığacık Akkum: A bit far but beautiful for a peaceful afternoon.";
        }
        else if (w === "imbat" && s === "strong" && a === "windsurfing") {
            recommendation = "📍 Urla Gülbahçe: Ideal constant wind for kite and windsurfing.";
        }
        else {
            // Default/Fallback logic
            recommendation = "📍 Kordon Alsancak: When in doubt, enjoy the sea breeze in the city center.";
        }

        // Show Result
        const resultDiv = document.getElementById('result');
        resultDiv.style.display = "block";
        resultDiv.innerHTML = recommendation;
    }
</script>

</body>
</html>
